<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面走丢了 - Jimday</title>
    
    <!-- 配置变量 - 请根据需要修改以下变量 -->
    <script>
        // 跳转目标网址 - 修改为您的主页地址
        const REDIRECT_URL = 'https://cloudflare.daijianmin.com/';
        
        // 版权信息
        const COPYRIGHT_INFO = '© Jimday.cn All Rights Reserved. Template from Cola0908 | Modified by 豆包 AI';
        
        // 倒计时秒数
        const COUNTDOWN_SECONDS = 15;
        
        // 星星数量 - 已改为50个
        const STARS_COUNT = 50;
        
        // 漂浮图标数量
        const ICONS_COUNT = 6;
    </script>
    <style>
        /* 全局颜色变量 - 自动适配深色/浅色模式 */
        :root {
            --bg-gradient-start: #f5f7fa;
            --bg-gradient-end: #c3cfe2;
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --text-muted: #5a6c7d;
            --accent-color: #3498db;
            --accent-dark: #2980b9;
            --accent-darker: #1a5276;
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: rgba(52, 73, 94, 0.1);
            --card-shadow: rgba(0, 0, 0, 0.1);
            --card-shadow-hover: rgba(0, 0, 0, 0.15);
            --progress-start: #3498db;
            --progress-end: #2ecc71;
            --warning-bg: rgba(243, 156, 18, 0.15);
            --warning-border: rgba(243, 156, 18, 0.3);
            --warning-text: #f39c12;
            --danger-bg: rgba(231, 76, 60, 0.15);
            --danger-border: rgba(231, 76, 60, 0.3);
            --danger-text: #e74c3c;
            --star-color: white;
            --star-glow: rgba(255, 255, 255, 0.8);
        }

        /* 深色模式自动适配 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-gradient-start: #1a1a2e;
                --bg-gradient-end: #16213e;
                --text-primary: #e0e0e0;
                --text-secondary: #a0a0a0;
                --text-muted: #808080;
                --accent-color: #4dabf7;
                --accent-dark: #339af0;
                --accent-darker: #228be6;
                --card-bg: rgba(30, 30, 50, 0.85);
                --card-border: rgba(77, 171, 247, 0.2);
                --card-shadow: rgba(0, 0, 0, 0.3);
                --card-shadow-hover: rgba(0, 0, 0, 0.4);
                --progress-start: #4dabf7;
                --progress-end: #51cf66;
                --warning-bg: rgba(255, 193, 7, 0.2);
                --warning-border: rgba(255, 193, 7, 0.4);
                --warning-text: #ffc107;
                --danger-bg: rgba(255, 107, 107, 0.2);
                --danger-border: rgba(255, 107, 107, 0.4);
                --danger-text: #ff6b6b;
                --star-color: #e0e0e0;
                --star-glow: rgba(224, 224, 224, 0.6);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            color: var(--text-primary);
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        /* 背景动画星星 */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: var(--star-color);
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
            box-shadow: 0 0 6px var(--star-glow);
            will-change: opacity, transform;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* 主容器 - 已移除视差效果 */
        .container {
            text-align: center;
            z-index: 10;
            position: relative;
            max-width: 600px;
            padding: 20px;
        }

        /* 404数字动画 - 呼吸发光效果 */
        .error-code {
            font-size: 8rem;
            font-weight: 300;
            margin-bottom: 20px;
            color: var(--text-primary);
            animation: fadeIn 1.5s ease-out, breath-glow 5s ease-in-out infinite;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: -0.05em;
            text-shadow: 0 2px 10px var(--card-shadow);
            user-select: none;
            will-change: transform, opacity, filter;
        }

        .error-code:hover {
            transform: scale(1.08) rotate(-1deg);
            color: var(--accent-color);
            text-shadow: 0 5px 20px rgba(52, 152, 219, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 呼吸发光动画 */
        @keyframes breath-glow {
            0%, 100% { 
                transform: scale(1); 
                opacity: 1;
                filter: drop-shadow(0 0 5px rgba(77, 171, 247, 0.15));
            }
            50% { 
                transform: scale(1.015); 
                opacity: 0.98;
                filter: drop-shadow(0 0 12px rgba(77, 171, 247, 0.35));
            }
        }

        /* 404数字摇摆效果 */
        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-8px) rotate(-3deg); }
            75% { transform: translateX(8px) rotate(3deg); }
        }

        /* 标题和描述 */
        .title {
            font-size: 2.2rem;
            margin-bottom: 15px;
            font-weight: 400;
            color: var(--text-primary);
            animation: fadeInUp 1s ease-out;
            text-shadow: 0 1px 3px var(--card-shadow);
        }

        .description {
            font-size: 1.1rem;
            margin-bottom: 30px;
            opacity: 0.8;
            color: var(--text-secondary);
            line-height: 1.6;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 倒计时样式 */
        .countdown {
            font-size: 1.2rem;
            margin-bottom: 30px;
            padding: 12px 24px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--card-border);
            display: inline-block;
            color: var(--text-primary);
            box-shadow: 0 4px 15px var(--card-shadow);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
            will-change: background, color, border-color;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(77, 171, 247, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(77, 171, 247, 0); }
            100% { box-shadow: 0 0 0 0 rgba(77, 171, 247, 0); }
        }

        /* 按钮样式 */
        .home-button {
            display: inline-block;
            padding: 14px 36px;
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-dark) 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
            user-select: none;
            will-change: transform, box-shadow;
        }

        .home-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4);
            background: linear-gradient(135deg, var(--accent-dark) 0%, var(--accent-darker) 100%);
        }

        .home-button:active {
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(52, 152, 219, 0.3);
        }

        /* 按钮波纹效果 */
        .home-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease-out, height 0.6s ease-out;
            pointer-events: none;
        }

        .home-button:active::before {
            width: 500px;
            height: 500px;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* 漂浮的小图标 */
        .floating-icons {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .icon {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.2;
            animation: float 8s ease-in-out infinite;
            filter: drop-shadow(0 2px 4px var(--card-shadow));
            will-change: transform;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(180deg); }
        }

        /* 版权信息样式 - 新增动画效果 */
        .copyright {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            letter-spacing: 0.3px;
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 25px;
            box-shadow: 0 2px 10px var(--card-shadow);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            animation: copyright-float 6s ease-in-out infinite;
            will-change: transform, box-shadow;
        }

        .copyright:hover {
            transform: translateX(-50%) translateY(-3px);
            box-shadow: 0 6px 18px var(--card-shadow-hover);
            animation-play-state: paused;
        }

        @media (prefers-color-scheme: dark) {
            .copyright {
                border: 1px solid rgba(77, 171, 247, 0.2);
            }
        }

        /* 版权信息浮动动画 */
        @keyframes copyright-float {
            0%, 100% { 
                transform: translateX(-50%) translateY(0px); 
            }
            50% { 
                transform: translateX(-50%) translateY(-5px); 
            }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .error-code {
                font-size: 5.5rem;
            }
            .title {
                font-size: 1.8rem;
            }
            .description {
                font-size: 1rem;
                padding: 0 10px;
            }
            .countdown {
                font-size: 1.1rem;
                padding: 10px 18px;
            }
            .home-button {
                padding: 12px 30px;
                font-size: 1rem;
            }
            .copyright {
                font-size: 0.7rem;
                bottom: 15px;
                padding: 8px 16px;
            }
            .icon {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .error-code {
                font-size: 4.5rem;
            }
            .title {
                font-size: 1.5rem;
            }
            .countdown {
                font-size: 1rem;
            }
        }

        /* 进度条 */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--card-border);
            border-radius: 2px;
            margin: 20px 0;
            overflow: hidden;
            box-shadow: inset 0 1px 3px var(--card-shadow);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--progress-start) 0%, var(--progress-end) 100%);
            border-radius: 2px;
            transition: width 1s linear;
            width: 100%;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
            will-change: width;
        }

        /* 减少动画偏好 */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- 背景星星 -->
    <div class="stars" id="stars"></div>
    
    <!-- 漂浮图标 -->
    <div class="floating-icons" id="floatingIcons"></div>

    <div class="container">
        <div class="error-code" onclick="shake(this)">404</div>
        <h1 class="title">页面未找到</h1>
        <p class="description">抱歉，您访问的页面不存在或已被移动。<br>让我们帮您回到正确的地方。</p>
        
        <div class="countdown" id="countdown">
            <span id="timer">15</span> 秒后自动返回主页
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <a href="#" class="home-button" id="homeButton">
            返回首页
        </a>
    </div>

    <!-- 版权信息 -->
    <div class="copyright" id="copyrightText">
        <!-- 版权信息将通过JavaScript动态设置 -->
    </div>

    <script>
        // 创建星星背景 - 已改为50个
        function createStars() {
            const starsContainer = document.getElementById('stars');
            
            for (let i = 0; i < STARS_COUNT; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 2 + 2) + 's';
                starsContainer.appendChild(star);
            }
        }

        // 创建漂浮图标
        function createFloatingIcons() {
            const iconsContainer = document.getElementById('floatingIcons');
            const icons = ['✨', '🌟', '💫', '⭐', '🌙', '☁️', '💎', '🔮', 
                          '💧', '🌸', '🍃', '🎈', '🎀', '💜', '🦋', '🌿'];
            
            for (let i = 0; i < ICONS_COUNT; i++) {
                const icon = document.createElement('div');
                icon.className = 'icon';
                icon.textContent = icons[Math.floor(Math.random() * icons.length)];
                icon.style.left = Math.random() * 100 + '%';
                icon.style.top = Math.random() * 100 + '%';
                icon.style.animationDelay = Math.random() * 8 + 's';
                icon.style.animationDuration = (Math.random() * 4 + 6) + 's';
                iconsContainer.appendChild(icon);
            }
        }

        // 404数字摇摆效果
        function shake(element) {
            element.style.animation = 'none';
            element.offsetHeight; // 触发重绘
            element.style.animation = 'shake 0.5s ease-in-out, breath-glow 5s ease-in-out infinite';
            
            setTimeout(() => {
                element.style.animation = 'breath-glow 5s ease-in-out infinite';
            }, 500);
        }

        // 倒计时功能
        let timeLeft = COUNTDOWN_SECONDS;
        const timerElement = document.getElementById('timer');
        const progressFill = document.getElementById('progressFill');
        const countdownElement = document.getElementById('countdown');
        
        function updateCountdown() {
            timerElement.textContent = timeLeft;
            
            // 更新进度条
            const progressPercent = ((COUNTDOWN_SECONDS - timeLeft) / COUNTDOWN_SECONDS) * 100;
            progressFill.style.width = progressPercent + '%';
            
            // 倒计时颜色变化
            if (timeLeft <= 3) {
                countdownElement.style.background = 'var(--danger-bg)';
                countdownElement.style.color = 'var(--danger-text)';
                countdownElement.style.borderColor = 'var(--danger-border)';
                countdownElement.style.animation = 'pulse 1s infinite';
            } else if (timeLeft <= 5) {
                countdownElement.style.background = 'var(--warning-bg)';
                countdownElement.style.color = 'var(--warning-text)';
                countdownElement.style.borderColor = 'var(--warning-border)';
                countdownElement.style.animation = 'pulse 1.5s infinite';
            }
            
            if (timeLeft <= 0) {
                window.location.href = REDIRECT_URL;
                return;
            }
            
            timeLeft--;
            setTimeout(updateCountdown, 1000);
        }

        // 鼠标移动视差效果 - 已移除主容器视差
        let ticking = false;
        document.addEventListener('mousemove', (e) => {
            if (!ticking) {
                requestAnimationFrame(() => {
                    const mouseX = e.clientX / window.innerWidth - 0.5;
                    const mouseY = e.clientY / window.innerHeight - 0.5;
                    
                    // 星星视差
                    const stars = document.querySelectorAll('.star');
                    stars.forEach((star, index) => {
                        const speed = (index % 5 + 1) * 0.3;
                        const x = mouseX * speed * 20;
                        const y = mouseY * speed * 20;
                        star.style.transform = `translate(${x}px, ${y}px)`;
                    });
                    
                    // 图标视差
                    const icons = document.querySelectorAll('.icon');
                    icons.forEach((icon, index) => {
                        const speed = (index % 4 + 1) * 0.5;
                        const x = mouseX * speed * 30;
                        const y = mouseY * speed * 30;
                        icon.style.transform = `translate(${x}px, ${y}px)`;
                    });
                    
                    ticking = false;
                });
                ticking = true;
            }
        });

        // 按钮点击波纹效果
        document.getElementById('homeButton').addEventListener('click', function(e) {
            e.preventDefault();
            
            // 创建点击波纹效果
            const ripple = document.createElement('span');
            const rect = this.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = e.clientX - rect.left - size / 2;
            const y = e.clientY - rect.top - size / 2;
            
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.classList.add('ripple');
            
            this.appendChild(ripple);
            
            setTimeout(() => {
                ripple.remove();
                window.location.href = REDIRECT_URL;
            }, 300);
        });

        // 键盘导航支持
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                document.getElementById('homeButton').click();
            }
        });

        // 初始化配置
        function initializeConfig() {
            // 设置跳转链接
            document.getElementById('homeButton').href = REDIRECT_URL;
            
            // 设置版权信息
            document.getElementById('copyrightText').textContent = COPYRIGHT_INFO;
            
            // 设置初始倒计时显示
            document.getElementById('timer').textContent = COUNTDOWN_SECONDS;
        }

        // 初始化
        createStars();
        createFloatingIcons();
        initializeConfig();
        updateCountdown();
        
        // 页面加载动画
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 100);
        });

        // 防止页面被嵌入到iframe中
        if (window.top !== window.self) {
            window.top.location.href = window.location.href;
        }

        // 清理定时器防止内存泄漏
        window.addEventListener('beforeunload', () => {
            const allTimers = setTimeout(() => {}, 0);
            for (let i = 0; i < allTimers; i++) {
                clearTimeout(i);
            }
        });
    </script>
</body>
</html>
